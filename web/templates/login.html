{% extends "base.html" %}
{% block content %}

<section class="panel auth-panel fade-in">
    <div class="hero-title">ACCESS CONTROL</div>
    <div class="hero-symbol" style="font-size:26px;">LOGIN</div>

    {% if error %}
    <div style="margin-top:16px; padding:12px; background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.4); color:#fca5a5; border-radius:10px; font-size:14px; font-weight:500;">
        {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="auth-form">
        <div class="form-group">
            <label>EMAIL</label>
            <input type="email" name="email" required placeholder="you@domain.com">
        </div>

        <div class="form-group">
            <label>PASSWORD</label>
            <input type="password" name="password" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn-primary" style="margin-top:12px; width:100%;">
            AUTHENTICATE
        </button>
    </form>

    <div class="auth-subtext">
        New to the.market.coder? <a href="/signup">Create Account</a>
    </div>
</section>

{% endblock %}
