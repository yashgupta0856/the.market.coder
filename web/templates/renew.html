{% extends "base.html" %}
{% block content %}

<section class="panel auth-panel fade-in">
    <div class="hero-title">SUBSCRIPTION SYSTEM</div>
    <div class="hero-symbol" style="font-size:26px;">RENEW ACCESS</div>

    {% if error %}
    <div style="margin-top:16px; padding:12px; background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.4); color:#fca5a5; border-radius:10px; font-size:14px; font-weight:500;">
        {{ error }}
    </div>
    {% endif %}

    <div style="margin-top:20px; font-size:14px; color:var(--muted); text-align:left; line-height:1.6;">
        Your access relies on 1-month manual renewals. Scan the QR code, complete the transaction, and upload the proof below to extend your dashboard access.
    </div>

    <form method="post" action="/renew" enctype="multipart/form-data" class="auth-form" style="margin-top: 20px;">
        
        <div class="form-group" style="margin-bottom: 8px;">
            <label>Payment Code (QR)</label>
            <img src="/static/payment.jpeg" style="width:100%; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px;">
        </div>

        <div class="form-group">
            <label>Upload Payment Proof</label>
            <input type="file" name="payment_proof" required style="padding: 10px; background: rgba(0,0,0,0.2);">
        </div>

        <button type="submit" class="btn-primary" style="margin-top:18px; width:100%;">
            SUBMIT FOR RENEWAL
        </button>
    </form>
</section>

{% endblock %}
