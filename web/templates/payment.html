{% extends "base.html" %}
{% block content %}

<section class="panel auth-panel fade-in" style="margin-top: 120px; padding: 40px; border-color: rgba(16, 185, 129, 0.4); box-shadow: 0 10px 40px rgba(16, 185, 129, 0.1);">
    <div style="font-size: 48px; margin-bottom: 20px;">✅</div>
    
    <div class="hero-title" style="color: var(--secondary);">REQUEST SUBMITTED</div>
    <div class="hero-symbol" style="font-size:24px; margin-bottom: 20px;">Transmission Complete</div>

    <p style="font-size: 15px; color: var(--muted); line-height: 1.6; margin-bottom: 30px;">
        Your payment proof has been uploaded securely to the administrative queue. 
        Access to the dashboard and community engines will be granted or renewed upon verification.
    </p>

    <a href="/" class="btn-primary" style="width: 100%;">Return to Base</a>
</section>

{% endblock %}
