{% extends "base.html" %}
{% block content %}

<section class="panel auth-panel fade-in" style="max-width: 600px;">
    <div class="hero-title" style="color: var(--warning);">ADMIN COMMAND</div>
    <div class="hero-symbol" style="font-size:26px;">PUBLISH RESEARCH NOTE</div>

    {% if message %}
    <div style="margin-top:16px; padding:12px; background:rgba(16,185,129,0.15); border:1px solid rgba(16,185,129,0.4); color:#6ee7b7; border-radius:10px; font-size:14px; font-weight:500;">
        {{ message }}
    </div>
    {% endif %}

    <form method="post" action="/api/community/create" enctype="multipart/form-data" class="auth-form" style="margin-top: 24px;">
        
        <div class="form-group">
            <label>Stock Symbol</label>
            <input type="text" name="symbol" required placeholder="e.g. RELIANCE">
        </div>

        <div class="form-group">
            <label>Entry Price</label>
            <input type="text" name="entry" placeholder="₹">
        </div>

        <div class="form-group">
            <label>Upload Chart (Image)</label>
            <input type="file" name="image" required style="padding: 10px; background: rgba(0,0,0,0.2);">
        </div>

        <div class="form-group">
            <label>Commentary / Notes</label>
            <textarea name="commentary" rows="3" placeholder="Setup thesis ..."></textarea>
        </div>

        <button type="submit" class="btn-primary" style="margin-top:14px; width:100%;">
            PUBLISH TO COMMUNITY
        </button>
    </form>
</section>

{% endblock %}
