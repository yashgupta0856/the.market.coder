{% extends "base.html" %}
{% block content %}

<section class="panel auth-panel fade-in">
    <div class="hero-title">USER REGISTRATION</div>
    <div class="hero-symbol" style="font-size:26px;">CREATE ACCOUNT</div>

    {% if error %}
    <div style="margin-top:16px; padding:12px; background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.4); color:#fca5a5; border-radius:10px; font-size:14px; font-weight:500;">
        {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/signup" enctype="multipart/form-data" class="auth-form">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" required placeholder="Your Full Name">
        </div>

        <div class="form-group">
            <label>EMAIL</label>
            <input type="email" name="email" required placeholder="you@domain.com">
        </div>

        <div class="form-group">
            <label>PASSWORD</label>
            <input type="password" name="password" required placeholder="Minimum 8 characters">
        </div>

        <div class="form-group">
            <label>Trading View ID (Optional)</label>
            <input type="text" name="tradingview_id" placeholder="@username">
        </div>

        <div class="form-group" style="margin-top: 10px;">
            <label>Payment Code (QR)</label>
            <img src="/static/payment.jpeg" style="width:100%; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px;">
            <label>Upload Payment Proof (1 Month Access)</label>
            <input type="file" name="payment_proof" required style="padding: 10px; background: rgba(0,0,0,0.2);">
        </div>

        <button type="submit" class="btn-primary" style="margin-top:12px; width:100%;">
            REGISTER
        </button>
    </form>

    <div class="auth-subtext">
        Already have access? <a href="/login">Login</a>
    </div>
</section>

{% endblock %}
