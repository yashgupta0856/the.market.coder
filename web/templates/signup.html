{% extends "base.html" %}
{% block content %}

<section class="panel" style="max-width:420px;margin:80px auto;">
    <div style="text-align:center;margin-bottom:22px;">
        <div class="hero-title">USER REGISTRATION</div>
        <div class="hero-symbol" style="font-size:22px;">CREATE ACCOUNT</div>
    </div>

    {% if error %}
        <div style="
            margin-bottom:16px;
            padding:10px 12px;
            background:rgba(239,68,68,0.15);
            border:1px solid rgba(239,68,68,0.4);
            color:#fecaca;
            border-radius:8px;
            font-family:var(--mono);
            font-size:12px;
        ">
            {{ error }}
        </div>
    {% endif %}

    <!-- <form method="post" action="/signup" style="display:flex;flex-direction:column;gap:14px;"> -->
<form
  method="post"
  action="/signup"
  enctype="multipart/form-data"
  style="display:flex;flex-direction:column;gap:14px;"
>

        <label style="font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--muted);">
            Full Name
        </label>
        <input
            type="text"
            name="name"
            required
            placeholder="Your Full Name"
            style="
                padding:10px 12px;
                border-radius:8px;
                background:rgba(255,255,255,0.04);
                border:1px solid rgba(255,255,255,0.12);
                color:var(--text);
                font-family:var(--mono);
            "
        >


        <label style="font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--muted);">
            EMAIL
        </label>
        <input
            type="email"
            name="email"
            required
            placeholder="you@domain.com"
            style="
                padding:10px 12px;
                border-radius:8px;
                background:rgba(255,255,255,0.04);
                border:1px solid rgba(255,255,255,0.12);
                color:var(--text);
                font-family:var(--mono);
            "
        >

        <label style="font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--muted);">
            PASSWORD
        </label>
        <input
            type="password"
            name="password"
            required
            placeholder="minimum 8 characters"
            style="
                padding:10px 12px;
                border-radius:8px;
                background:rgba(255,255,255,0.04);
                border:1px solid rgba(255,255,255,0.12);
                color:var(--text);
                font-family:var(--mono);
            "
        >


                <label style="font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--muted);">
            Trading View ID 
        </label>
        <input
            type="text"
            name="tradingViewId"
            
            placeholder="Your Trading View ID ( Optional )"
            style="
                padding:10px 12px;
                border-radius:8px;
                background:rgba(255,255,255,0.04);
                border:1px solid rgba(255,255,255,0.12);
                color:var(--text);
                font-family:var(--mono);
            "
        >
 <img src="/static/payment.jpeg" width="200">
<label style="font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--muted);">
        Payment Proof ( for 1 Month Subscription)
        </label>
        <input type="file" name="payment_proof" required>

        <button
            type="submit"
            class="risk-btn"
            style="margin-top:18px;"
        >
            REGISTER
        </button>
    </form>

    <div style="margin-top:20px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted);">
        Already have access?
        <a href="/login" style="color:var(--accent);text-decoration:none;">
            Login
        </a>
    </div>
</section>

{% endblock %}
