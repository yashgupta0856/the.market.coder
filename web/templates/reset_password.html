{% extends "base.html" %}
{% block content %}

<section class="panel auth-panel fade-in">
    <div class="hero-title">ACCOUNT RECOVERY</div>
    <div class="hero-symbol" style="font-size:26px;">RESET PASSWORD</div>

    {% if error %}
    <div style="margin-top:16px; padding:12px; background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.4); color:#fca5a5; border-radius:10px; font-size:14px; font-weight:500;">
        {{ error }}
    </div>
    {% endif %}

    {% if valid_token %}
    <form method="post" action="/reset-password" class="auth-form" style="margin-top: 24px;">
        <input type="hidden" name="token" value="{{ token }}">

        <div class="form-group">
            <label>NEW PASSWORD</label>
            <input type="password" name="password" required placeholder="Minimum 8 characters">
        </div>

        <div class="form-group">
            <label>CONFIRM PASSWORD</label>
            <input type="password" name="confirm_password" required placeholder="Re-enter password">
        </div>

        <button type="submit" class="btn-primary" style="margin-top:12px; width:100%;">
            UPDATE PASSWORD
        </button>
    </form>
    {% else %}
    <p style="margin-top:20px; font-size:14px; color:var(--muted); line-height:1.6;">
        This reset link is invalid or has expired. Please request a new one.
    </p>
    <a href="/forgot-password" class="btn-primary" style="margin-top:16px; width:100%; display:inline-block; text-align:center;">
        REQUEST NEW LINK
    </a>
    {% endif %}

    <div class="auth-subtext">
        Remember your password? <a href="/login">Login</a>
    </div>
</section>

{% endblock %}
